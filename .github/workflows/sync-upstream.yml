name: Sync with upstream

on:
  schedule:
    - cron: '0 6 * * *'   # runs daily at 06:00 UTC
  workflow_dispatch:        # allows manual trigger from GitHub UI

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch upstream and merge
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote add upstream https://github.com/shanraisshan/claude-code-best-practice.git
          git fetch upstream
          git merge upstream/main --no-edit --allow-unrelated-histories -X ours || {
            echo "Merge failed — skipping auto-sync. Resolve manually."
            exit 1
          }
          git push origin main
